version: "1.0"
name: sync-gitee-wiki
displayName: Sync Gitee Wiki

triggers:
  push:
    branches:
      include:
        - main

stages:
  - stage:
    name: sync_wiki
    displayName: Sync Gitee Wiki
    strategy: naturally
    trigger: auto
    steps:
      - step: build@python
        name: sync_gitee_wiki
        displayName: Sync ready articles to Gitee Wiki
        pythonVersion: "3.9"
        commands:
          - |
            if [ -z "$GITEE_TOKEN" ]; then
              echo "Missing GITEE_TOKEN. Add it as a Gitee Go pipeline variable or secret." >&2
              exit 1
            fi
          - git config --global user.name "${GITEE_USERNAME:-ExDevilLee}"
          - git config --global user.email "${GITEE_EMAIL:-gitee-go@users.noreply.gitee.com}"
          - git config --global url."https://${GITEE_USERNAME:-ExDevilLee}:${GITEE_TOKEN}@gitee.com/".insteadOf "https://gitee.com/"
          - python3 -m py_compile scripts/sync_wiki.py
          - python3 scripts/sync_wiki.py --push --site-name "Gitee Wiki" --wiki-dir ".wiki/ai-work-system.gitee-wiki" --remote "https://gitee.com/ExDevilLee/ai-work-system.wiki.git"
