version: "1.0"
name: sync-gitee-wiki
displayName: Sync Gitee Wiki

triggers:
  push:
    branches:
      include:
        - main

stages:
  - stage:
    name: sync_wiki
    displayName: Sync Gitee Wiki
    strategy: naturally
    trigger: auto
    steps:
      - step: build@python
        name: sync_gitee_wiki
        displayName: Sync ready articles to Gitee Wiki
        pythonVersion: "3.9"
        commands:
          - |
            WIKI_USERNAME="${WIKI_PUSH_USERNAME:-ExDevilLee}"
            WIKI_EMAIL="${WIKI_PUSH_EMAIL:-gitee-go@users.noreply.gitee.com}"
            WIKI_TOKEN="${WIKI_PUSH_TOKEN}"

            if [ -z "$WIKI_TOKEN" ]; then
              echo "Missing WIKI_PUSH_TOKEN. Add it as a Gitee Go common variable, enable secret text, and associate it with this pipeline." >&2
              exit 1
            fi
            git config --global user.name "$WIKI_USERNAME"
            git config --global user.email "$WIKI_EMAIL"
            git config --global url."https://${WIKI_USERNAME}:${WIKI_TOKEN}@gitee.com/".insteadOf "https://gitee.com/"
          - python3 -m py_compile scripts/sync_wiki.py
          - python3 scripts/sync_wiki.py --push --site-name "Gitee Wiki" --wiki-dir ".wiki/ai-work-system.gitee-wiki" --remote "https://gitee.com/ExDevilLee/ai-work-system.wiki.git"
