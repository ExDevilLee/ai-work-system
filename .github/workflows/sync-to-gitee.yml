name: Sync to Gitee

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "30 18 * * *"

concurrency:
  group: sync-to-gitee
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-wiki.txt

      - name: Install pinned dependencies
        run: python -m pip install --requirement requirements-wiki.txt

      - name: Run Wiki publishing tests
        run: python -m unittest tests.test_sync_wiki tests.test_verify_wiki -v

      - name: Push mirror to Gitee
        env:
          GITEE_USERNAME: ${{ secrets.GITEE_USERNAME }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_REPO: ${{ secrets.GITEE_REPO }}
        run: |
          if [ -z "$GITEE_USERNAME" ] || [ -z "$GITEE_TOKEN" ] || [ -z "$GITEE_REPO" ]; then
            echo "Missing one or more required Gitee secrets." >&2
            exit 1
          fi

          git remote add gitee "https://${GITEE_USERNAME}:${GITEE_TOKEN}@gitee.com/${GITEE_REPO}.git"
          git push gitee main:main --force
          git push gitee --tags --force

      - name: Sync Gitee Wiki fallback
        env:
          GITEE_USERNAME: ${{ secrets.GITEE_USERNAME }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          if [ -z "$GITEE_USERNAME" ] || [ -z "$GITEE_TOKEN" ]; then
            echo "Missing Gitee credentials for Wiki sync." >&2
            exit 1
          fi

          git config --global user.name "$GITEE_USERNAME"
          git config --global user.email "github-actions@users.noreply.github.com"
          git config --global url."https://${GITEE_USERNAME}:${GITEE_TOKEN}@gitee.com/".insteadOf "https://gitee.com/"

          python3 -m py_compile scripts/sync_wiki.py
          python scripts/verify_wiki.py \
            --phase pre \
            --site-name "Gitee Wiki" \
            --wiki-base-url "https://gitee.com/ExDevilLee/ai-work-system/wikis" \
            --asset-base-url "https://gitee.com/ExDevilLee/ai-work-system/raw/main"
          python3 scripts/sync_wiki.py --push \
            --site-name "Gitee Wiki" \
            --wiki-dir ".wiki/ai-work-system.gitee-wiki" \
            --remote "https://gitee.com/ExDevilLee/ai-work-system.wiki.git" \
            --wiki-base-url "https://gitee.com/ExDevilLee/ai-work-system/wikis" \
            --asset-base-url "https://gitee.com/ExDevilLee/ai-work-system/raw/main"
          python scripts/verify_wiki.py \
            --phase post \
            --site-name "Gitee Wiki" \
            --wiki-base-url "https://gitee.com/ExDevilLee/ai-work-system/wikis" \
            --asset-base-url "https://gitee.com/ExDevilLee/ai-work-system/raw/main" \
            --remote "https://gitee.com/ExDevilLee/ai-work-system.wiki.git"
