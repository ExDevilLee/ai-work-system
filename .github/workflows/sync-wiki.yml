name: Sync Wiki

on:
  push:
    branches:
      - main
    paths:
      - "content/articles/**"
      - "content/series.json"
      - "scripts/series_catalog.py"
      - "scripts/sync_wiki.py"
      - "scripts/verify_wiki.py"
      - "tests/test_sync_wiki.py"
      - "tests/test_verify_wiki.py"
      - "tests/test_update_readme_index.py"
      - "requirements-wiki.txt"
      - ".github/workflows/sync-wiki.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-wiki
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-wiki.txt

      - name: Install pinned dependencies
        run: python -m pip install --requirement requirements-wiki.txt

      - name: Run Wiki publishing tests
        run: python -m unittest tests.test_update_readme_index tests.test_sync_wiki tests.test_verify_wiki -v

      - name: Configure Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Configure GitHub auth for wiki push
        env:
          GITHUB_TOKEN: ${{ github.token }}
          WIKI_PUSH_TOKEN: ${{ secrets.WIKI_PUSH_TOKEN }}
        run: |
          token="${WIKI_PUSH_TOKEN:-$GITHUB_TOKEN}"
          git config --global url."https://x-access-token:${token}@github.com/".insteadOf "https://github.com/"

      - name: Verify GitHub Wiki before publishing
        run: |
          python scripts/verify_wiki.py \
            --phase pre \
            --site-name "GitHub Wiki" \
            --wiki-base-url "https://github.com/ExDevilLee/ai-work-system/wiki" \
            --asset-base-url "https://raw.githubusercontent.com/ExDevilLee/ai-work-system/main"

      - name: Sync ready articles to GitHub Wiki
        run: python3 scripts/sync_wiki.py --push

      - name: Verify GitHub Wiki after publishing
        run: |
          python scripts/verify_wiki.py \
            --phase post \
            --site-name "GitHub Wiki" \
            --wiki-base-url "https://github.com/ExDevilLee/ai-work-system/wiki" \
            --asset-base-url "https://raw.githubusercontent.com/ExDevilLee/ai-work-system/main" \
            --remote "https://github.com/ExDevilLee/ai-work-system.wiki.git"
