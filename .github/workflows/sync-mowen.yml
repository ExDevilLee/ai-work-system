name: Sync MoWen

on:
  push:
    branches:
      - main
    paths:
      - "content/articles/**"
      - "assets/mowen/**"
      - "publishing/mowen-notes.json"
      - "scripts/sync_mowen.py"
      - "tests/test_sync_mowen.py"
      - "requirements-mowen.txt"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/sync-mowen.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-mowen
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-mowen.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install pinned dependencies
        run: |
          python -m pip install --requirement requirements-mowen.txt
          npm ci --ignore-scripts

      - name: Run MoWen publishing tests
        run: python -m unittest tests.test_sync_mowen -v

      - name: Check MoWen secret
        env:
          MOWEN_API_KEY: ${{ secrets.MOWEN_API_KEY }}
        run: |
          if [ -z "$MOWEN_API_KEY" ]; then
            echo "Missing required MOWEN_API_KEY secret." >&2
            exit 1
          fi

      - name: Publish ready articles and directory to MoWen
        env:
          MOWEN_API_KEY: ${{ secrets.MOWEN_API_KEY }}
        run: |
          python scripts/sync_mowen.py --publish \
            --cover-url "https://raw.githubusercontent.com/ExDevilLee/ai-work-system/main/assets/mowen/ai-work-system-cover.jpg"

      - name: Persist new MoWen note mappings
        run: |
          if git diff --quiet -- publishing/mowen-notes.json; then
            echo "No new MoWen note mappings."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add publishing/mowen-notes.json
          git commit -m "chore: persist MoWen note mappings"
          git pull --rebase origin main
          git push origin HEAD:main
