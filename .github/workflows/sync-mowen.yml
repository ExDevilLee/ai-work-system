name: Sync MoWen

on:
  workflow_run:
    workflows:
      - Sync to Gitee
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-mowen
  cancel-in-progress: false

jobs:
  sync:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-mowen.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install pinned dependencies
        run: |
          python -m pip install --requirement requirements-mowen.txt
          npm ci --ignore-scripts

      - name: Run MoWen publishing tests
        run: python -m unittest tests.test_sync_mowen -v

      - name: Check MoWen secret
        env:
          MOWEN_API_KEY: ${{ secrets.MOWEN_API_KEY }}
        run: |
          if [ -z "$MOWEN_API_KEY" ]; then
            echo "Missing required MOWEN_API_KEY secret." >&2
            exit 1
          fi

      - name: Publish ready articles and directory to MoWen
        env:
          MOWEN_API_KEY: ${{ secrets.MOWEN_API_KEY }}
        run: |
          python scripts/sync_mowen.py --publish \
            --cover-url "https://gitee.com/ExDevilLee/ai-work-system/raw/main/assets/mowen/ai-work-system-cover.jpg"

      # The current non-PRO account has 10 API calls per day. Preserve partial
      # progress after quota failures, but do not trigger another CI run today.
      - name: Persist MoWen publishing progress
        if: ${{ !cancelled() }}
        run: |
          if git diff --quiet -- publishing/mowen-notes.json; then
            echo "No new MoWen publishing progress."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add publishing/mowen-notes.json
          git commit -m "chore: persist MoWen publishing progress [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main
