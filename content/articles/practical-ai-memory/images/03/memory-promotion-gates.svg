<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">长期记忆晋升状态图</title>
  <desc id="desc">一条经验从原始记录进入待验证观察，经过证据门禁成为候选经验，再通过人工决定进入稳定记忆；冲突、过期和敏感信息走向补证、历史保留或排除。</desc>

  <rect width="1600" height="900" fill="#f7f8fa"/>
  <text x="80" y="82" fill="#18212b" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="40" font-weight="700">一条经验怎样进入长期记忆？</text>
  <text x="80" y="126" fill="#5b6573" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">记录、证据和批准是三道不同的门槛</text>

  <rect x="80" y="255" width="245" height="180" rx="8" fill="#ffffff" stroke="#7a8490" stroke-width="3"/>
  <rect x="80" y="255" width="245" height="12" rx="6" fill="#7a8490"/>
  <text x="202" y="324" text-anchor="middle" fill="#303a45" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="700">原始记录</text>
  <text x="202" y="370" text-anchor="middle" fill="#697482" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20">先保留发生了什么</text>
  <text x="202" y="402" text-anchor="middle" fill="#697482" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20">暂不判断是否可信</text>

  <path d="M325 345 H385" stroke="#596573" stroke-width="4" fill="none"/>
  <path d="M385 345 L365 333 L365 357 Z" fill="#596573"/>

  <rect x="385" y="255" width="245" height="180" rx="8" fill="#ffffff" stroke="#3772b9" stroke-width="3"/>
  <rect x="385" y="255" width="245" height="12" rx="6" fill="#3772b9"/>
  <text x="507" y="324" text-anchor="middle" fill="#285b96" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="700">待验证观察</text>
  <text x="507" y="370" text-anchor="middle" fill="#697482" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20">可能有复用价值</text>
  <text x="507" y="402" text-anchor="middle" fill="#697482" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20">继续收集独立证据</text>

  <path d="M630 345 H690" stroke="#596573" stroke-width="4" fill="none"/>
  <path d="M690 345 L670 333 L670 357 Z" fill="#596573"/>
  <text x="660" y="230" text-anchor="middle" fill="#53606d" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="17">证据通过</text>

  <rect x="690" y="255" width="245" height="180" rx="8" fill="#ffffff" stroke="#1f8a70" stroke-width="3"/>
  <rect x="690" y="255" width="245" height="12" rx="6" fill="#1f8a70"/>
  <text x="812" y="324" text-anchor="middle" fill="#176b58" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="700">候选经验</text>
  <text x="812" y="370" text-anchor="middle" fill="#697482" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20">证据与来源已整理</text>
  <text x="812" y="402" text-anchor="middle" fill="#697482" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20">还不是稳定事实</text>

  <path d="M935 345 H995" stroke="#596573" stroke-width="4" fill="none"/>
  <path d="M995 345 L975 333 L975 357 Z" fill="#596573"/>

  <rect x="995" y="255" width="245" height="180" rx="8" fill="#ffffff" stroke="#d98138" stroke-width="3"/>
  <rect x="995" y="255" width="245" height="12" rx="6" fill="#d98138"/>
  <text x="1117" y="324" text-anchor="middle" fill="#a75a20" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="700">人工决定</text>
  <text x="1117" y="370" text-anchor="middle" fill="#697482" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20">批准 · 拒绝 · 补证</text>
  <text x="1117" y="402" text-anchor="middle" fill="#697482" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20">确认范围与后果</text>

  <path d="M1240 345 H1300" stroke="#596573" stroke-width="4" fill="none"/>
  <path d="M1300 345 L1280 333 L1280 357 Z" fill="#596573"/>
  <text x="1270" y="230" text-anchor="middle" fill="#53606d" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="17">明确批准</text>

  <rect x="1300" y="255" width="220" height="180" rx="8" fill="#ffffff" stroke="#27835f" stroke-width="4"/>
  <rect x="1300" y="255" width="220" height="12" rx="6" fill="#27835f"/>
  <text x="1410" y="324" text-anchor="middle" fill="#176b58" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="700">稳定记忆</text>
  <text x="1410" y="370" text-anchor="middle" fill="#697482" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20">可以指导未来行动</text>
  <text x="1410" y="402" text-anchor="middle" fill="#697482" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20">保留来源与范围</text>

  <text x="80" y="510" fill="#4c5865" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700">未通过门禁时的处理</text>
  <rect x="315" y="535" width="385" height="145" rx="8" fill="#ffffff" stroke="#b65f76" stroke-width="3"/>
  <text x="507" y="588" text-anchor="middle" fill="#91455a" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="25" font-weight="700">冲突或证据不足</text>
  <text x="507" y="630" text-anchor="middle" fill="#697482" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="19">暂停晋升 · 控制变量复验 · 继续补证</text>

  <rect x="735" y="535" width="385" height="145" rx="8" fill="#ffffff" stroke="#9a7a32" stroke-width="3"/>
  <text x="927" y="588" text-anchor="middle" fill="#7b6024" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="25" font-weight="700">过期或仅限旧版本</text>
  <text x="927" y="630" text-anchor="middle" fill="#697482" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="19">保留历史范围 · 不作为当前规则</text>

  <rect x="1155" y="535" width="365" height="145" rx="8" fill="#ffffff" stroke="#bd4c4c" stroke-width="3"/>
  <text x="1337" y="588" text-anchor="middle" fill="#963a3a" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="25" font-weight="700">包含敏感信息</text>
  <text x="1337" y="630" text-anchor="middle" fill="#697482" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="19">排除原始值 · 脱敏后重新验证</text>

  <rect x="225" y="760" width="1150" height="72" rx="8" fill="#edf1f4"/>
  <text x="800" y="806" text-anchor="middle" fill="#35414d" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="23" font-weight="700">有价值 ≠ 已验证　　完成脱敏 ≠ 可以晋升　　没有反对 ≠ 明确批准</text>
</svg>
