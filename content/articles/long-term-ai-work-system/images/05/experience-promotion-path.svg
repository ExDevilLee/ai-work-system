<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">经验沉淀路径图</title><desc id="desc">一次观察经过验证后，可以逐步成为项目规则、工作流和自动化脚本，也可以在任何阶段停止。</desc>
  <style>text{font-family:"PingFang SC","Microsoft YaHei",sans-serif}.h{font-size:42px;font-weight:700;fill:#18212b}.sub{font-size:22px;fill:#5b6573}.t{font-size:25px;font-weight:700}.b{font-size:18px;fill:#66717e}</style>
  <rect width="1600" height="900" fill="#f7f8fa"/><text class="h" x="80" y="86">一次经验如何进入长期系统</text><text class="sub" x="80" y="130">每向右走一步，都需要更稳定的证据，也带来更长期的影响</text>
  <path d="M320 365 H365 M615 365 H660 M910 365 H955 M1205 365 H1250" stroke="#aeb7c2" stroke-width="4"/>
  <g><rect x="70" y="275" width="250" height="180" rx="8" fill="#fff" stroke="#7b8794" stroke-width="3"/><text class="t" x="195" y="345" text-anchor="middle" fill="#4d5965">临时观察</text><text class="b" x="195" y="395" text-anchor="middle">刚刚发生了什么</text></g>
  <g><rect x="365" y="275" width="250" height="180" rx="8" fill="#fff" stroke="#d98138" stroke-width="3"/><text class="t" x="490" y="345" text-anchor="middle" fill="#aa5c21">已验证经验</text><text class="b" x="490" y="395" text-anchor="middle">复现过，处理有效</text></g>
  <g><rect x="660" y="275" width="250" height="180" rx="8" fill="#fff" stroke="#1f8a70" stroke-width="3"/><text class="t" x="785" y="345" text-anchor="middle" fill="#176b58">项目规则</text><text class="b" x="785" y="395" text-anchor="middle">未来还会影响判断</text></g>
  <g><rect x="955" y="275" width="250" height="180" rx="8" fill="#fff" stroke="#3772b9" stroke-width="3"/><text class="t" x="1080" y="345" text-anchor="middle" fill="#285b96">工作流</text><text class="b" x="1080" y="395" text-anchor="middle">步骤开始稳定重复</text></g>
  <g><rect x="1250" y="275" width="250" height="180" rx="8" fill="#fff" stroke="#b65f76" stroke-width="3"/><text class="t" x="1375" y="345" text-anchor="middle" fill="#91455a">自动化脚本</text><text class="b" x="1375" y="395" text-anchor="middle">输入输出可以检查</text></g>
  <path d="M490 455 V570 M785 455 V570 M1080 455 V570" stroke="#c0c7d0" stroke-width="3" stroke-dasharray="8 8"/>
  <rect x="240" y="570" width="1120" height="145" rx="8" fill="#fff" stroke="#c5ccd4" stroke-width="2"/>
  <text x="800" y="625" text-anchor="middle" font-size="23" font-weight="700" fill="#33404d">并不是每条经验都要走完整条路径</text>
  <text x="420" y="680" text-anchor="middle" class="b">只发生一次：留在记录</text><text x="800" y="680" text-anchor="middle" class="b">尚未验证：继续观察</text><text x="1180" y="680" text-anchor="middle" class="b">已经过期：删除或归档</text>
</svg>
