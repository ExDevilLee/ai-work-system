<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">长期 AI 协作中的工作重新分配</title>
  <desc id="desc">重复执行交给系统，需要理解的工作由 AI 协助，目标、取舍和责任仍由人承担。</desc>
  <style>
    text{font-family:"PingFang SC","Microsoft YaHei",sans-serif}
    .h{font-size:42px;font-weight:700;fill:#18212b}.sub{font-size:22px;fill:#5b6573}
    .ct{font-size:31px;font-weight:700}.cb{font-size:22px;fill:#33404d}.sm{font-size:19px;fill:#697482}
  </style>
  <rect width="1600" height="900" fill="#f7f8fa"/>
  <text class="h" x="80" y="86">当 AI 成为长期协作者，工作如何重新分配</text>
  <text class="sub" x="80" y="130">不是让人退出，而是把每类工作放到更合适的位置</text>
  <rect x="80" y="205" width="440" height="430" rx="8" fill="#fff" stroke="#1f8a70" stroke-width="3"/>
  <rect x="80" y="205" width="440" height="18" rx="8" fill="#1f8a70"/>
  <text class="ct" x="125" y="285" fill="#176b58">交给系统</text>
  <text class="cb" x="125" y="335">规则明确，可以稳定重复</text>
  <text class="sm" x="125" y="405">固定执行</text><text class="sm" x="125" y="450">格式与路径检查</text>
  <text class="sm" x="125" y="495">跨平台同步</text><text class="sm" x="125" y="540">状态和进度保存</text>
  <text x="300" y="600" text-anchor="middle" font-size="20" font-weight="600" fill="#176b58">减少重复和遗漏</text>
  <rect x="580" y="205" width="440" height="430" rx="8" fill="#fff" stroke="#3772b9" stroke-width="3"/>
  <rect x="580" y="205" width="440" height="18" rx="8" fill="#3772b9"/>
  <text class="ct" x="625" y="285" fill="#285b96">让 AI 协助</text>
  <text class="cb" x="625" y="335">需要理解上下文，但还不做最终决定</text>
  <text class="sm" x="625" y="405">回顾历史</text><text class="sm" x="625" y="450">发现矛盾和遗漏</text>
  <text class="sm" x="625" y="495">整理证据与选项</text><text class="sm" x="625" y="540">暴露需要判断的位置</text>
  <text x="800" y="600" text-anchor="middle" font-size="20" font-weight="600" fill="#285b96">缩小人的判断范围</text>
  <rect x="1080" y="205" width="440" height="430" rx="8" fill="#fff" stroke="#b65f76" stroke-width="3"/>
  <rect x="1080" y="205" width="440" height="18" rx="8" fill="#b65f76"/>
  <text class="ct" x="1125" y="285" fill="#91455a">由人承担</text>
  <text class="cb" x="1125" y="335">涉及方向、价值和最终责任</text>
  <text class="sm" x="1125" y="405">定义目标</text><text class="sm" x="1125" y="450">补充关键背景</text>
  <text class="sm" x="1125" y="495">处理例外与取舍</text><text class="sm" x="1125" y="540">决定结果是否值得接受</text>
  <text x="1300" y="600" text-anchor="middle" font-size="20" font-weight="600" fill="#91455a">为选择和结果负责</text>
  <path d="M520 420 H580" stroke="#aeb7c2" stroke-width="4"/>
  <path d="M1020 420 H1080" stroke="#aeb7c2" stroke-width="4"/>
  <text x="800" y="748" text-anchor="middle" font-size="25" font-weight="700" fill="#33404d">人做得更少，不等于人变得不重要</text>
  <text x="800" y="792" text-anchor="middle" font-size="22" fill="#5b6573">人的注意力从具体动作，转向目标、边界、例外、取舍和责任</text>
</svg>
