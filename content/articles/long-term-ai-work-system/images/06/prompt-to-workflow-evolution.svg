<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">从提示词到工作流演进图</title><desc id="desc">重复提醒逐步进入项目规则、检查清单、脚本和持续集成，人的判断仍然保留。</desc>
  <style>text{font-family:"PingFang SC","Microsoft YaHei",sans-serif}.h{font-size:42px;font-weight:700;fill:#18212b}.sub{font-size:22px;fill:#5b6573}.t{font-size:23px;font-weight:700;fill:#26323e}.b{font-size:18px;fill:#66717e}</style>
  <rect width="1600" height="900" fill="#f7f8fa"/><text class="h" x="80" y="86">重复提醒如何变成工作流</text><text class="sub" x="80" y="130">先让真实做法稳定下来，再逐步交给系统</text>
  <path d="M320 340 H365 M615 340 H660 M910 340 H955 M1205 340 H1250" stroke="#aeb7c2" stroke-width="4"/>
  <g><rect x="70" y="250" width="250" height="180" rx="8" fill="#fff" stroke="#7b8794" stroke-width="3"/><text class="t" x="195" y="325" text-anchor="middle">每次口头提醒</text><text class="b" x="195" y="375" text-anchor="middle">这一次记得做</text></g>
  <g><rect x="365" y="250" width="250" height="180" rx="8" fill="#fff" stroke="#1f8a70" stroke-width="3"/><text class="t" x="490" y="325" text-anchor="middle">写进项目规则</text><text class="b" x="490" y="375" text-anchor="middle">以后都应该遵守</text></g>
  <g><rect x="660" y="250" width="250" height="180" rx="8" fill="#fff" stroke="#d98138" stroke-width="3"/><text class="t" x="785" y="325" text-anchor="middle">整理检查清单</text><text class="b" x="785" y="375" text-anchor="middle">步骤和顺序明确</text></g>
  <g><rect x="955" y="250" width="250" height="180" rx="8" fill="#fff" stroke="#3772b9" stroke-width="3"/><text class="t" x="1080" y="325" text-anchor="middle">稳定步骤变脚本</text><text class="b" x="1080" y="375" text-anchor="middle">结果可以自动验证</text></g>
  <g><rect x="1250" y="250" width="250" height="180" rx="8" fill="#fff" stroke="#b65f76" stroke-width="3"/><text class="t" x="1375" y="325" text-anchor="middle">明确触发后进 CI</text><text class="b" x="1375" y="375" text-anchor="middle">到时自动运行</text></g>
  <rect x="500" y="555" width="600" height="175" rx="8" fill="#fff" stroke="#27313d" stroke-width="3"/><text x="800" y="625" text-anchor="middle" font-size="27" font-weight="700" fill="#26323e">人的判断仍然保留</text><text x="800" y="675" text-anchor="middle" class="b">内容质量、阅读体验和风险是否可以接受</text>
  <text x="800" y="820" text-anchor="middle" font-size="22" font-weight="600" fill="#4c5865">自动化接住稳定执行，人只在真正需要判断的位置出现</text>
</svg>
