<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#f7f8fa"/>
  <style>
    .title { font: 700 38px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #26313d; }
    .subtitle { font: 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #5b6573; }
    .head { font: 700 27px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #26313d; }
    .body { font: 22px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #52606d; }
    .small { font: 20px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #66727f; }
    .rail { font: 700 22px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #44515e; }
  </style>

  <text x="80" y="82" class="title">不是所有有用的信息，都应该长期留下</text>
  <text x="80" y="128" class="subtitle">先确定使用范围，再决定保存时间和公开边界</text>

  <path d="M175 220 V744" stroke="#aeb7c2" stroke-width="4"/>
  <path d="M160 724 L175 744 L190 724" fill="none" stroke="#aeb7c2" stroke-width="4"/>
  <text x="126" y="482" text-anchor="middle" class="rail" transform="rotate(-90 126 482)">信息越敏感，约束越严格</text>

  <rect x="250" y="180" width="1260" height="135" rx="8" fill="#ffffff" stroke="#2f8f68" stroke-width="3"/>
  <rect x="250" y="180" width="22" height="135" rx="8" fill="#2f8f68"/>
  <text x="320" y="232" class="head">可公开复用</text>
  <text x="320" y="274" class="body">公开资料、确认后的方法、模板与脱敏案例</text>
  <text x="1435" y="250" text-anchor="end" class="small">可进入公共仓库与分享平台</text>

  <rect x="250" y="335" width="1260" height="135" rx="8" fill="#ffffff" stroke="#3772b9" stroke-width="3"/>
  <rect x="250" y="335" width="22" height="135" rx="8" fill="#3772b9"/>
  <text x="320" y="387" class="head">私有长期保存</text>
  <text x="320" y="429" class="body">稳定背景、确认决定、当前状态与长期偏好</text>
  <text x="1435" y="405" text-anchor="end" class="small">限制访问，并设置更新与删除条件</text>

  <rect x="250" y="490" width="1260" height="135" rx="8" fill="#ffffff" stroke="#d98138" stroke-width="3"/>
  <rect x="250" y="490" width="22" height="135" rx="8" fill="#d98138"/>
  <text x="320" y="542" class="head">仅在当前任务临时使用</text>
  <text x="320" y="584" class="body">完成任务所需的敏感材料、日志片段与业务截图</text>
  <text x="1435" y="560" text-anchor="end" class="small">最小提取、必要脱敏、用后清理</text>

  <rect x="250" y="645" width="1260" height="135" rx="8" fill="#ffffff" stroke="#c6534d" stroke-width="3"/>
  <rect x="250" y="645" width="22" height="135" rx="8" fill="#c6534d"/>
  <text x="320" y="697" class="head">不应提供或保存</text>
  <text x="320" y="739" class="body">密码、私钥、一次性验证码、完整 cookie 与无关第三方数据</text>
  <text x="1435" y="715" text-anchor="end" class="small">交给受控工具，不进入提示词和项目记忆</text>

  <rect x="345" y="818" width="1070" height="56" rx="8" fill="#ffffff" stroke="#c5ccd4" stroke-width="2"/>
  <text x="880" y="854" text-anchor="middle" class="body">目标不是让 AI 知道更多，而是让它只知道完成任务所必需的内容</text>
</svg>
