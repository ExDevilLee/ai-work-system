<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">从生成到可以接受的状态图</title><desc id="desc">AI 生成结果并完成执行后，还需要收集证据和进行 Review，才能判断结果可以接受。</desc>
  <style>text{font-family:"PingFang SC","Microsoft YaHei",sans-serif}.h{font-size:42px;font-weight:700;fill:#18212b}.sub{font-size:22px;fill:#5b6573}.t{font-size:24px;font-weight:700;fill:#26323e}.b{font-size:18px;fill:#66717e}</style>
  <rect width="1600" height="900" fill="#f7f8fa"/><text class="h" x="80" y="86">任务完成之前，还差哪一步</text><text class="sub" x="80" y="130">生成和执行只说明动作发生，Review 才决定结果能否进入下一步</text>
  <path d="M320 360 H365 M615 360 H660 M910 360 H955 M1205 360 H1250" stroke="#aeb7c2" stroke-width="4"/>
  <g><rect x="70" y="270" width="250" height="180" rx="8" fill="#fff" stroke="#7b8794" stroke-width="3"/><text class="t" x="195" y="345" text-anchor="middle">已经生成</text><text class="b" x="195" y="395" text-anchor="middle">输出已经存在</text></g>
  <g><rect x="365" y="270" width="250" height="180" rx="8" fill="#fff" stroke="#d98138" stroke-width="3"/><text class="t" x="490" y="345" text-anchor="middle">已经执行</text><text class="b" x="490" y="395" text-anchor="middle">动作已经发生</text></g>
  <g><rect x="660" y="270" width="250" height="180" rx="8" fill="#fff" stroke="#3772b9" stroke-width="3"/><text class="t" x="785" y="345" text-anchor="middle">收集证据</text><text class="b" x="785" y="395" text-anchor="middle">测试、差异、真实页面</text></g>
  <g><rect x="955" y="270" width="250" height="180" rx="8" fill="#fff" stroke="#b65f76" stroke-width="3"/><text class="t" x="1080" y="345" text-anchor="middle">Review</text><text class="b" x="1080" y="395" text-anchor="middle">检查目标、质量和风险</text></g>
  <g><rect x="1250" y="270" width="250" height="180" rx="8" fill="#fff" stroke="#1f8a70" stroke-width="3"/><text class="t" x="1375" y="345" text-anchor="middle">可以接受</text><text class="b" x="1375" y="395" text-anchor="middle">允许进入下一步</text></g>
  <rect x="280" y="550" width="1040" height="150" rx="8" fill="#fff" stroke="#c5ccd4" stroke-width="2"/><text x="800" y="615" text-anchor="middle" font-size="25" font-weight="700" fill="#33404d">流水线成功，只能证明动作完成</text><text x="800" y="660" text-anchor="middle" class="b">它不能单独证明内容正确、体验舒服，或者风险已经可以接受</text>
  <text x="800" y="800" text-anchor="middle" font-size="23" font-weight="600" fill="#4c5865">生成结果 → 稳定执行 → 提供证据 → 作出判断</text>
</svg>
