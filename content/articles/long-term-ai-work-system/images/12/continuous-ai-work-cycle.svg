<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#f7f8fa"/>
  <style>
    .title { font: 700 38px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #26313d; }
    .subtitle { font: 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #5b6573; }
    .label { font: 700 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #33404d; }
    .body { font: 22px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #5b6573; }
    .side { font: 700 25px "PingFang SC", "Microsoft YaHei", sans-serif; }
  </style>

  <text x="80" y="85" class="title">不会从零开始，改变的是任务的连续性</text>
  <text x="80" y="130" class="subtitle">能力不只来自一次生成，也来自接手、推进、验证、恢复和沉淀</text>

  <text x="80" y="235" class="side" fill="#b65f76">普通 AI 聊天</text>
  <rect x="300" y="185" width="1160" height="100" rx="8" fill="#ffffff" stroke="#d8b9c2" stroke-width="2"/>
  <text x="430" y="245" text-anchor="middle" class="label">重新解释背景</text>
  <path d="M570 235 H690" stroke="#c3c9d0" stroke-width="4" stroke-dasharray="10 9"/>
  <text x="815" y="245" text-anchor="middle" class="label">完成一次生成</text>
  <path d="M960 235 H1080" stroke="#c3c9d0" stroke-width="4" stroke-dasharray="10 9"/>
  <text x="1260" y="245" text-anchor="middle" class="label">下次重新开始</text>

  <text x="80" y="320" class="side" fill="#1f8a70">长期工作系统</text>

  <path d="M420 430 H505 M755 430 H840 M1090 430 H1175" stroke="#aeb7c2" stroke-width="4"/>
  <path d="M485 415 L505 430 L485 445 M820 415 L840 430 L820 445 M1155 415 L1175 430 L1155 445" fill="none" stroke="#aeb7c2" stroke-width="4"/>

  <rect x="170" y="340" width="250" height="180" rx="8" fill="#ffffff" stroke="#d98138" stroke-width="3"/>
  <rect x="170" y="340" width="250" height="15" rx="8" fill="#d98138"/>
  <text x="295" y="420" text-anchor="middle" class="label">接手上下文</text>
  <text x="295" y="465" text-anchor="middle" class="body">理解当前状态</text>

  <rect x="505" y="340" width="250" height="180" rx="8" fill="#ffffff" stroke="#3772b9" stroke-width="3"/>
  <rect x="505" y="340" width="250" height="15" rx="8" fill="#3772b9"/>
  <text x="630" y="420" text-anchor="middle" class="label">推进任务</text>
  <text x="630" y="465" text-anchor="middle" class="body">照顾前后关系</text>

  <rect x="840" y="340" width="250" height="180" rx="8" fill="#ffffff" stroke="#1f8a70" stroke-width="3"/>
  <rect x="840" y="340" width="250" height="15" rx="8" fill="#1f8a70"/>
  <text x="965" y="420" text-anchor="middle" class="label">检查发布</text>
  <text x="965" y="465" text-anchor="middle" class="body">获得真实证据</text>

  <rect x="1175" y="340" width="250" height="180" rx="8" fill="#ffffff" stroke="#b65f76" stroke-width="3"/>
  <rect x="1175" y="340" width="250" height="15" rx="8" fill="#b65f76"/>
  <text x="1300" y="420" text-anchor="middle" class="label">沉淀结果</text>
  <text x="1300" y="465" text-anchor="middle" class="body">留下下次起点</text>

  <path d="M1300 520 V620 H295 V520" fill="none" stroke="#aeb7c2" stroke-width="4"/>
  <path d="M280 540 L295 520 L310 540" fill="none" stroke="#aeb7c2" stroke-width="4"/>
  <text x="800" y="665" text-anchor="middle" class="body">新会话、不同模型或不同工具，仍然可以从已有状态继续</text>

  <rect x="280" y="735" width="1040" height="85" rx="8" fill="#ffffff" stroke="#c5ccd4" stroke-width="2"/>
  <text x="800" y="790" text-anchor="middle" class="label">系统保留的不是某个聊天窗口，而是工作的连续性</text>
</svg>
