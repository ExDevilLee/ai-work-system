<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">最小项目记忆系统结构图</title>
  <desc id="desc">README、AI 规则入口、当前状态记录、工作流与检查清单共同组成最小项目记忆系统。</desc>

  <rect width="1600" height="900" fill="#f7f8fa"/>

  <text x="80" y="86" fill="#18212b" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="42" font-weight="700">最小项目记忆系统</text>
  <text x="80" y="130" fill="#5b6573" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">不需要先建复杂知识库，只要让四类关键信息各归其位</text>

  <path d="M480 295 C555 295 555 380 625 380" fill="none" stroke="#b6bec8" stroke-width="3"/>
  <path d="M1120 295 C1045 295 1045 380 975 380" fill="none" stroke="#b6bec8" stroke-width="3"/>
  <path d="M480 665 C555 665 555 500 625 500" fill="none" stroke="#b6bec8" stroke-width="3"/>
  <path d="M1120 665 C1045 665 1045 500 975 500" fill="none" stroke="#b6bec8" stroke-width="3"/>

  <rect x="570" y="315" width="460" height="245" rx="8" fill="#ffffff" stroke="#27313d" stroke-width="3"/>
  <rect x="570" y="315" width="460" height="16" rx="8" fill="#27313d"/>
  <text x="800" y="400" text-anchor="middle" fill="#18212b" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="34" font-weight="700">项目</text>
  <text x="800" y="445" text-anchor="middle" fill="#33404d" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="25" font-weight="600">共同的长期协作上下文</text>
  <text x="800" y="493" text-anchor="middle" fill="#697482" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20">人和 AI 都从这里了解项目</text>
  <text x="800" y="523" text-anchor="middle" fill="#697482" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20">但每类信息承担不同职责</text>

  <rect x="80" y="190" width="400" height="210" rx="8" fill="#ffffff" stroke="#1f8a70" stroke-width="3"/>
  <rect x="80" y="190" width="14" height="210" rx="7" fill="#1f8a70"/>
  <text x="125" y="248" fill="#176b58" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="700">README.md</text>
  <text x="125" y="290" fill="#26323e" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="23" font-weight="600">给人看的项目入口</text>
  <text x="125" y="334" fill="#66717e" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="19">项目是什么</text>
  <text x="125" y="367" fill="#66717e" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="19">第一次进入应该先看哪里</text>

  <rect x="1120" y="190" width="400" height="210" rx="8" fill="#ffffff" stroke="#3772b9" stroke-width="3"/>
  <rect x="1506" y="190" width="14" height="210" rx="7" fill="#3772b9"/>
  <text x="1165" y="248" fill="#285b96" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="700">AGENTS.md / CLAUDE.md</text>
  <text x="1165" y="290" fill="#26323e" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="23" font-weight="600">给 AI 看的协作规则</text>
  <text x="1165" y="334" fill="#66717e" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="19">应该怎样工作</text>
  <text x="1165" y="367" fill="#66717e" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="19">哪些边界不能越过</text>

  <rect x="80" y="560" width="400" height="210" rx="8" fill="#ffffff" stroke="#d98138" stroke-width="3"/>
  <rect x="80" y="560" width="14" height="210" rx="7" fill="#d98138"/>
  <text x="125" y="618" fill="#aa5c21" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="700">PROJECT-STATE.md</text>
  <text x="125" y="660" fill="#26323e" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="23" font-weight="600">当前状态记录</text>
  <text x="125" y="704" fill="#66717e" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="19">现在正在做什么</text>
  <text x="125" y="737" fill="#66717e" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="19">已经完成什么，下一步是什么</text>

  <rect x="1120" y="560" width="400" height="210" rx="8" fill="#ffffff" stroke="#b65f76" stroke-width="3"/>
  <rect x="1506" y="560" width="14" height="210" rx="7" fill="#b65f76"/>
  <text x="1165" y="618" fill="#91455a" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="700">工作流与检查清单</text>
  <text x="1165" y="660" fill="#26323e" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="23" font-weight="600">重复任务的执行路径</text>
  <text x="1165" y="704" fill="#66717e" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="19">什么时候触发</text>
  <text x="1165" y="737" fill="#66717e" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="19">按什么步骤执行，怎样验证</text>

  <text x="800" y="842" text-anchor="middle" fill="#4c5865" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="600">四类信息相互补充，不互相替代</text>
</svg>
