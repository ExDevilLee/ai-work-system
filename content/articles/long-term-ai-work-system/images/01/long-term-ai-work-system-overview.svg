<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">长期 AI 工作系统总览</title>
  <desc id="desc">外部记忆与稳定规则、可执行流程与验证证据、人工判断与持续复盘，共同组成长期 AI 工作系统。</desc>
  <style>
    text { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; }
    .title { font-size: 42px; font-weight: 700; fill: #18212b; }
    .subtitle { font-size: 22px; fill: #5b6573; }
    .card-title { font-size: 29px; font-weight: 700; }
    .item { font-size: 23px; font-weight: 600; fill: #26323e; }
    .explain { font-size: 19px; fill: #697482; }
  </style>

  <rect width="1600" height="900" fill="#f7f8fa"/>
  <text class="title" x="80" y="86">长期 AI 工作系统，不只是多保存一些信息</text>
  <text class="subtitle" x="80" y="130">它需要同时接住上下文、执行过程、完成证据和人的责任</text>

  <rect x="80" y="205" width="440" height="315" rx="8" fill="#ffffff" stroke="#1f8a70" stroke-width="3"/>
  <rect x="80" y="205" width="440" height="18" rx="8" fill="#1f8a70"/>
  <text class="card-title" x="125" y="283" fill="#176b58">知道从哪里继续</text>
  <text class="item" x="125" y="350">外部记忆</text>
  <text class="explain" x="125" y="386">保存项目事实、历史决定和当前状态</text>
  <path d="M125 420 H475" stroke="#d8dde3" stroke-width="2"/>
  <text class="item" x="125" y="465">稳定规则</text>
  <text class="explain" x="125" y="501">说明协作方式、可信源头和边界</text>

  <rect x="580" y="205" width="440" height="315" rx="8" fill="#ffffff" stroke="#3772b9" stroke-width="3"/>
  <rect x="580" y="205" width="440" height="18" rx="8" fill="#3772b9"/>
  <text class="card-title" x="625" y="283" fill="#285b96">把任务推进完整</text>
  <text class="item" x="625" y="350">可执行流程</text>
  <text class="explain" x="625" y="386">把稳定步骤连接成可重复的路径</text>
  <path d="M625 420 H975" stroke="#d8dde3" stroke-width="2"/>
  <text class="item" x="625" y="465">验证证据</text>
  <text class="explain" x="625" y="501">证明结果正确，而不只证明动作结束</text>

  <rect x="1080" y="205" width="440" height="315" rx="8" fill="#ffffff" stroke="#d98138" stroke-width="3"/>
  <rect x="1080" y="205" width="440" height="18" rx="8" fill="#d98138"/>
  <text class="card-title" x="1125" y="283" fill="#aa5c21">守住方向并持续改进</text>
  <text class="item" x="1125" y="350">人工判断</text>
  <text class="explain" x="1125" y="386">决定目标、取舍、风险和最终责任</text>
  <path d="M1125 420 H1475" stroke="#d8dde3" stroke-width="2"/>
  <text class="item" x="1125" y="465">持续复盘</text>
  <text class="explain" x="1125" y="501">把验证过的经验带进下一轮工作</text>

  <path d="M300 520 V595 H800" fill="none" stroke="#aeb7c2" stroke-width="4"/>
  <path d="M800 520 V595" fill="none" stroke="#aeb7c2" stroke-width="4"/>
  <path d="M1300 520 V595 H800" fill="none" stroke="#aeb7c2" stroke-width="4"/>
  <path d="M800 595 V650" fill="none" stroke="#aeb7c2" stroke-width="4"/>
  <path d="M788 634 L800 650 L812 634" fill="none" stroke="#aeb7c2" stroke-width="4"/>

  <rect x="300" y="650" width="1000" height="150" rx="8" fill="#ffffff" stroke="#27313d" stroke-width="3"/>
  <rect x="300" y="650" width="1000" height="16" rx="8" fill="#27313d"/>
  <text x="800" y="724" text-anchor="middle" fill="#18212b" font-size="34" font-weight="700">长期 AI 工作系统</text>
  <text x="800" y="766" text-anchor="middle" fill="#52606d" font-size="22">每次任务都能接住过去、完成现在，并为下一次留下更可靠的起点</text>
</svg>
