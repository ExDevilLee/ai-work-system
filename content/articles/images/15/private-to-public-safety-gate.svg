<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">私有内容进入公开系统的安全闸门</title>
  <desc id="desc">私有材料经过最小必要提取、脱敏检查和人工确认后才能成为公开内容，自动化不能越过人工确认。</desc>
  <style>
    text { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; }
    .title { font-size: 42px; font-weight: 700; fill: #18212b; }
    .subtitle { font-size: 22px; fill: #5b6573; }
    .step { font-size: 25px; font-weight: 700; }
    .body { font-size: 18px; fill: #5e6976; }
  </style>

  <rect width="1600" height="900" fill="#f7f8fa"/>
  <text class="title" x="80" y="86">从私有材料到公开内容，中间必须有安全闸门</text>
  <text class="subtitle" x="80" y="130">自动化可以协助提取和检查，但不能替责任承担者决定是否公开</text>

  <rect x="65" y="290" width="250" height="300" rx="8" fill="#ffffff" stroke="#d98138" stroke-width="3"/>
  <rect x="65" y="290" width="250" height="16" rx="8" fill="#d98138"/>
  <text class="step" x="100" y="370" fill="#aa5c21">私有材料</text>
  <text class="body" x="100" y="430">真实项目状态</text>
  <text class="body" x="100" y="466">内部资料与个人记录</text>
  <text class="body" x="100" y="502">默认不进入公开仓库</text>

  <path d="M315 440 H365" stroke="#aeb7c2" stroke-width="4"/>
  <path d="M353 428 L365 440 L353 452" fill="none" stroke="#aeb7c2" stroke-width="4"/>

  <rect x="365" y="290" width="250" height="300" rx="8" fill="#ffffff" stroke="#3772b9" stroke-width="3"/>
  <rect x="365" y="290" width="250" height="16" rx="8" fill="#3772b9"/>
  <text class="step" x="400" y="370" fill="#285b96">最小必要提取</text>
  <text class="body" x="400" y="430">只保留理解方法</text>
  <text class="body" x="400" y="466">和完成公开表达</text>
  <text class="body" x="400" y="502">真正需要的部分</text>

  <path d="M615 440 H665" stroke="#aeb7c2" stroke-width="4"/>
  <path d="M653 428 L665 440 L653 452" fill="none" stroke="#aeb7c2" stroke-width="4"/>

  <rect x="665" y="290" width="250" height="300" rx="8" fill="#ffffff" stroke="#1f8a70" stroke-width="3"/>
  <rect x="665" y="290" width="250" height="16" rx="8" fill="#1f8a70"/>
  <text class="step" x="700" y="370" fill="#176b58">脱敏检查</text>
  <text class="body" x="700" y="430">去掉身份与敏感值</text>
  <text class="body" x="700" y="466">检查图片、日志</text>
  <text class="body" x="700" y="502">和文件历史中的残留</text>

  <path d="M915 440 H965" stroke="#aeb7c2" stroke-width="4"/>
  <path d="M953 428 L965 440 L953 452" fill="none" stroke="#aeb7c2" stroke-width="4"/>

  <rect x="945" y="205" width="290" height="470" rx="8" fill="#fff9f8" stroke="#c6534d" stroke-width="4"/>
  <rect x="945" y="205" width="290" height="22" rx="8" fill="#c6534d"/>
  <text x="1090" y="270" text-anchor="middle" fill="#a13f3a" font-size="20" font-weight="700">自动化到此必须暂停</text>
  <rect x="985" y="330" width="210" height="220" rx="8" fill="#ffffff" stroke="#c6534d" stroke-width="3"/>
  <text class="step" x="1090" y="405" text-anchor="middle" fill="#a13f3a">人工确认</text>
  <text class="body" x="1090" y="458" text-anchor="middle">案例是否充分脱敏？</text>
  <text class="body" x="1090" y="494" text-anchor="middle">是否愿意承担公开责任？</text>
  <text x="1090" y="618" text-anchor="middle" fill="#a13f3a" font-size="19" font-weight="700">未确认，不得继续</text>

  <path d="M1235 440 H1285" stroke="#aeb7c2" stroke-width="4"/>
  <path d="M1273 428 L1285 440 L1273 452" fill="none" stroke="#aeb7c2" stroke-width="4"/>

  <rect x="1285" y="290" width="250" height="300" rx="8" fill="#ffffff" stroke="#1f8a70" stroke-width="3"/>
  <rect x="1285" y="290" width="250" height="16" rx="8" fill="#1f8a70"/>
  <text class="step" x="1320" y="370" fill="#176b58">公开内容</text>
  <text class="body" x="1320" y="430">文章、模板</text>
  <text class="body" x="1320" y="466">脱敏案例与方法</text>
  <text class="body" x="1320" y="502">可以进入发布链路</text>

  <rect x="270" y="755" width="1060" height="74" rx="8" fill="#ffffff" stroke="#c5ccd4" stroke-width="2"/>
  <text x="800" y="802" text-anchor="middle" fill="#33404d" font-size="23" font-weight="700">能自动同步的，只能是已经确认可以公开的内容</text>
</svg>
