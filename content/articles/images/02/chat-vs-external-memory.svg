<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">聊天记忆与外部记忆对比图</title><desc id="desc">只依赖聊天窗口时新会话需要重新解释，使用外部项目记忆时可以读取记录后继续。</desc>
  <style>text{font-family:"PingFang SC","Microsoft YaHei",sans-serif}.h{font-size:42px;font-weight:700;fill:#18212b}.sub{font-size:22px;fill:#5b6573}.ph{font-size:29px;font-weight:700}.st{font-size:23px;font-weight:600;fill:#33404d}.sm{font-size:19px;fill:#697482}</style>
  <rect width="1600" height="900" fill="#f7f8fa"/><text class="h" x="80" y="86">新会话为什么总像从零开始</text><text class="sub" x="80" y="130">区别不在于 AI 是否“记性好”，而在于关键背景有没有稳定保存</text>
  <rect x="80" y="205" width="680" height="470" rx="8" fill="#fff" stroke="#b65f76" stroke-width="3"/><text class="ph" x="125" y="275" fill="#91455a">只依赖聊天窗口</text>
  <rect x="130" y="335" width="170" height="95" rx="8" fill="#f9eef1"/><text class="st" x="215" y="392" text-anchor="middle">新会话</text><text x="340" y="392" font-size="34" fill="#9aa4af">→</text>
  <rect x="390" y="335" width="170" height="95" rx="8" fill="#f9eef1"/><text class="st" x="475" y="392" text-anchor="middle">背景消失</text><text x="600" y="392" font-size="34" fill="#9aa4af">→</text>
  <rect x="130" y="485" width="580" height="110" rx="8" fill="#f9eef1"/><text class="st" x="420" y="535" text-anchor="middle">重新解释项目、偏好和当前进度</text><text class="sm" x="420" y="570" text-anchor="middle">每次协作都要重新拼装上下文</text>
  <rect x="840" y="205" width="680" height="470" rx="8" fill="#fff" stroke="#1f8a70" stroke-width="3"/><text class="ph" x="885" y="275" fill="#176b58">使用外部项目记忆</text>
  <rect x="890" y="335" width="170" height="95" rx="8" fill="#eaf6f2"/><text class="st" x="975" y="392" text-anchor="middle">新会话</text><text x="1100" y="392" font-size="34" fill="#9aa4af">→</text>
  <rect x="1150" y="335" width="300" height="95" rx="8" fill="#eaf6f2"/><text class="st" x="1300" y="392" text-anchor="middle">读取稳定项目记录</text>
  <rect x="890" y="485" width="560" height="110" rx="8" fill="#eaf6f2"/><text class="st" x="1170" y="535" text-anchor="middle">从上次状态继续</text><text class="sm" x="1170" y="570" text-anchor="middle">README、项目规则、状态记录、Git 历史</text>
  <text x="800" y="775" text-anchor="middle" font-size="24" font-weight="700" fill="#33404d">外部记忆不是保存所有聊天，而是保存未来还会复用的关键背景</text>
</svg>
