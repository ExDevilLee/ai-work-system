<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Review 三层分工图</title><desc id="desc">自动检查、AI Review 和人工判断分别承担不同类型的审阅。</desc>
  <style>text{font-family:"PingFang SC","Microsoft YaHei",sans-serif}.h{font-size:42px;font-weight:700;fill:#18212b}.sub{font-size:22px;fill:#5b6573}.ct{font-size:31px;font-weight:700}.cb{font-size:22px;fill:#33404d}.sm{font-size:19px;fill:#697482}</style>
  <rect width="1600" height="900" fill="#f7f8fa"/>
  <text class="h" x="80" y="86">Review 的三层分工</text><text class="sub" x="80" y="130">不是尽量减少人，而是让每类判断去到最合适的位置</text>
  <path d="M490 410 H595" stroke="#aeb7c2" stroke-width="4"/><path d="M1005 410 H1110" stroke="#aeb7c2" stroke-width="4"/>
  <rect x="80" y="205" width="410" height="430" rx="8" fill="#fff" stroke="#1f8a70" stroke-width="3"/><rect x="80" y="205" width="410" height="18" rx="8" fill="#1f8a70"/>
  <text class="ct" x="125" y="285" fill="#176b58">自动检查</text><text class="cb" x="125" y="335">规则明确、结果可重复验证</text>
  <text class="sm" x="125" y="405">格式与状态</text><text class="sm" x="125" y="450">链接与测试</text><text class="sm" x="125" y="495">发布范围</text><text class="sm" x="125" y="540">固定检查项</text>
  <text x="285" y="600" text-anchor="middle" font-size="20" font-weight="600" fill="#176b58">交给脚本稳定执行</text>
  <rect x="595" y="205" width="410" height="430" rx="8" fill="#fff" stroke="#3772b9" stroke-width="3"/><rect x="595" y="205" width="410" height="18" rx="8" fill="#3772b9"/>
  <text class="ct" x="640" y="285" fill="#285b96">AI Review</text><text class="cb" x="640" y="335">需要理解上下文和发现疑点</text>
  <text class="sm" x="640" y="405">前后是否矛盾</text><text class="sm" x="640" y="450">是否遗漏要求</text><text class="sm" x="640" y="495">证据覆盖到哪里</text><text class="sm" x="640" y="540">哪些位置需要人选择</text>
  <text x="800" y="600" text-anchor="middle" font-size="20" font-weight="600" fill="#285b96">缩小人工判断范围</text>
  <rect x="1110" y="205" width="410" height="430" rx="8" fill="#fff" stroke="#b65f76" stroke-width="3"/><rect x="1110" y="205" width="410" height="18" rx="8" fill="#b65f76"/>
  <text class="ct" x="1155" y="285" fill="#91455a">人工判断</text><text class="cb" x="1155" y="335">涉及目标、价值、体验和责任</text>
  <text class="sm" x="1155" y="405">是否值得发布</text><text class="sm" x="1155" y="450">体验是否可以接受</text><text class="sm" x="1155" y="495">风险是否值得承担</text><text class="sm" x="1155" y="540">最终应该选择什么</text>
  <text x="1315" y="600" text-anchor="middle" font-size="20" font-weight="600" fill="#91455a">由责任承担者决定</text>
  <text x="800" y="740" text-anchor="middle" font-size="24" font-weight="700" fill="#33404d">标准越明确，越适合自动化；越接近价值取舍，越需要人</text>
  <path d="M220 790 H1380" stroke="#73808e" stroke-width="4"/><path d="M1380 790 l-18 -12 v24 z" fill="#73808e"/>
</svg>
