<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#f7f8fa"/>
  <style>
    .title { font: 700 38px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #26313d; }
    .subtitle { font: 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #5b6573; }
    .head { font: 700 27px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #33404d; }
    .body { font: 22px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #5b6573; }
    .action { font: 700 25px "PingFang SC", "Microsoft YaHei", sans-serif; }
    .small { font: 20px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #65717e; }
  </style>

  <text x="80" y="85" class="title">一条经验在长期工作系统中的生命周期</text>
  <text x="80" y="130" class="subtitle">沉淀不是终点，内容还需要根据实际使用持续调整</text>

  <path d="M370 330 H470 M760 330 H860" stroke="#aeb7c2" stroke-width="4"/>
  <path d="M450 315 L470 330 L450 345 M840 315 L860 330 L840 345" fill="none" stroke="#aeb7c2" stroke-width="4"/>

  <rect x="80" y="225" width="290" height="210" rx="8" fill="#ffffff" stroke="#d98138" stroke-width="3"/>
  <rect x="80" y="225" width="290" height="16" rx="8" fill="#d98138"/>
  <text x="225" y="305" text-anchor="middle" class="head">暂存观察</text>
  <text x="225" y="355" text-anchor="middle" class="body">记录真实问题</text>
  <text x="225" y="390" text-anchor="middle" class="body">保留验证条件</text>

  <rect x="470" y="225" width="290" height="210" rx="8" fill="#ffffff" stroke="#3772b9" stroke-width="3"/>
  <rect x="470" y="225" width="290" height="16" rx="8" fill="#3772b9"/>
  <text x="615" y="305" text-anchor="middle" class="head">验证使用</text>
  <text x="615" y="355" text-anchor="middle" class="body">确认是否会重复</text>
  <text x="615" y="390" text-anchor="middle" class="body">检查能否稳定复用</text>

  <rect x="860" y="225" width="290" height="210" rx="8" fill="#ffffff" stroke="#1f8a70" stroke-width="3"/>
  <rect x="860" y="225" width="290" height="16" rx="8" fill="#1f8a70"/>
  <text x="1005" y="305" text-anchor="middle" class="head">长期保留</text>
  <text x="1005" y="355" text-anchor="middle" class="body">进入规则、文档</text>
  <text x="1005" y="390" text-anchor="middle" class="body">脚本或工作流</text>

  <path d="M1150 330 H1240 V520" fill="none" stroke="#aeb7c2" stroke-width="4"/>
  <path d="M1225 500 L1240 520 L1255 500" fill="none" stroke="#aeb7c2" stroke-width="4"/>

  <rect x="1130" y="520" width="390" height="250" rx="8" fill="#ffffff" stroke="#b65f76" stroke-width="3"/>
  <rect x="1130" y="520" width="390" height="16" rx="8" fill="#b65f76"/>
  <text x="1325" y="590" text-anchor="middle" class="head">定期重新判断</text>
  <text x="1195" y="655" text-anchor="middle" class="action" fill="#3772b9">更新</text>
  <text x="1325" y="655" text-anchor="middle" class="action" fill="#1f8a70">合并</text>
  <text x="1455" y="655" text-anchor="middle" class="action" fill="#d98138">降级</text>
  <text x="1325" y="715" text-anchor="middle" class="action" fill="#b65f76">删除</text>

  <rect x="80" y="550" width="900" height="170" rx="8" fill="#ffffff" stroke="#c5ccd4" stroke-width="2"/>
  <text x="530" y="620" text-anchor="middle" class="head">清理不是否定过去</text>
  <text x="530" y="670" text-anchor="middle" class="body">而是让内容回到与当前价值相匹配的位置</text>
</svg>
