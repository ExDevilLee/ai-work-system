<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#f7f8fa"/>
  <style>
    .title { font: 700 38px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #26313d; }
    .subtitle { font: 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #5b6573; }
    .head { font: 700 28px "PingFang SC", "Microsoft YaHei", sans-serif; }
    .body { font: 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #33404d; }
    .small { font: 20px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #65717e; }
  </style>
  <text x="80" y="85" class="title">判断长期 AI 工作系统是否真的有帮助</text>
  <text x="80" y="130" class="subtitle">不要只看机制变多了多少，要看长期摩擦是否变少</text>

  <rect x="80" y="195" width="650" height="510" rx="8" fill="#ffffff" stroke="#1f8a70" stroke-width="3"/>
  <rect x="80" y="195" width="650" height="20" rx="8" fill="#1f8a70"/>
  <text x="405" y="280" text-anchor="middle" class="head" fill="#1f8a70">真正减负的信号</text>
  <line x1="150" y1="315" x2="660" y2="315" stroke="#d8e9e4" stroke-width="2"/>
  <text x="150" y="380" class="body">新任务更少从零开始</text>
  <text x="150" y="455" class="body">同类错误不再反复出现</text>
  <text x="150" y="530" class="body">人工提醒逐渐减少</text>
  <text x="150" y="605" class="body">失败后更容易定位和恢复</text>
  <text x="150" y="680" class="body">人更多关注目标与取舍</text>

  <rect x="870" y="195" width="650" height="510" rx="8" fill="#ffffff" stroke="#b65f76" stroke-width="3"/>
  <rect x="870" y="195" width="650" height="20" rx="8" fill="#b65f76"/>
  <text x="1195" y="280" text-anchor="middle" class="head" fill="#b65f76">系统变复杂的信号</text>
  <line x1="940" y1="315" x2="1450" y2="315" stroke="#f0dce1" stroke-width="2"/>
  <text x="940" y="380" class="body">维护规则比完成任务更费力</text>
  <text x="940" y="455" class="body">自动化很少被真实使用</text>
  <text x="940" y="530" class="body">同一要求散落在多个地方</text>
  <text x="940" y="605" class="body">人为流程服务，而不是工作目标</text>
  <text x="940" y="680" class="body">没人说得清机制为何还存在</text>

  <path d="M730 450 H870" stroke="#aeb7c2" stroke-width="4"/>
  <path d="M850 435 L870 450 L850 465" fill="none" stroke="#aeb7c2" stroke-width="4"/>
  <rect x="280" y="760" width="1040" height="75" rx="8" fill="#ffffff" stroke="#c5ccd4" stroke-width="2"/>
  <text x="800" y="808" text-anchor="middle" class="head" fill="#33404d">系统的价值不在于拥有多少机制，而在于是否减少长期摩擦</text>
</svg>
