<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#f7f8fa"/>
  <style>
    .title { font: 700 38px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #26313d; }
    .subtitle { font: 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #5b6573; }
    .head { font: 700 27px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #33404d; }
    .body { font: 22px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #5b6573; }
    .axis { font: 700 23px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #44515e; }
    .small { font: 20px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #65717e; }
  </style>

  <text x="80" y="85" class="title">不是所有任务都需要同样重的系统</text>
  <text x="80" y="130" class="subtitle">先看它是否重复，再看下一次是否依赖这一次</text>

  <text x="165" y="455" text-anchor="middle" class="axis" transform="rotate(-90 165 455)">重复频率：低 → 高</text>
  <text x="870" y="785" text-anchor="middle" class="axis">前后连续性：低 → 高</text>

  <path d="M210 735 V190 M210 735 H1480" stroke="#aeb7c2" stroke-width="4"/>
  <path d="M195 210 L210 190 L225 210 M1460 720 L1480 735 L1460 750" fill="none" stroke="#aeb7c2" stroke-width="4"/>

  <rect x="250" y="480" width="550" height="220" rx="8" fill="#ffffff" stroke="#c5ccd4" stroke-width="3"/>
  <rect x="250" y="480" width="550" height="16" rx="8" fill="#9aa4af"/>
  <text x="525" y="555" text-anchor="middle" class="head">临时聊一次</text>
  <text x="525" y="605" text-anchor="middle" class="body">输入完整，结果用完即结束</text>
  <text x="525" y="650" text-anchor="middle" class="small">例如：润色一句话、解释一个概念</text>

  <rect x="850" y="480" width="550" height="220" rx="8" fill="#ffffff" stroke="#d98138" stroke-width="3"/>
  <rect x="850" y="480" width="550" height="16" rx="8" fill="#d98138"/>
  <text x="1125" y="555" text-anchor="middle" class="head">建立项目状态</text>
  <text x="1125" y="605" text-anchor="middle" class="body">不常重复，但后续持续依赖当前决定</text>
  <text x="1125" y="650" text-anchor="middle" class="small">例如：搬家、求职、阶段性研究</text>

  <rect x="250" y="220" width="550" height="220" rx="8" fill="#ffffff" stroke="#3772b9" stroke-width="3"/>
  <rect x="250" y="220" width="550" height="16" rx="8" fill="#3772b9"/>
  <text x="525" y="295" text-anchor="middle" class="head">使用模板或快捷方式</text>
  <text x="525" y="345" text-anchor="middle" class="body">经常重复，但每次相对独立</text>
  <text x="525" y="390" text-anchor="middle" class="small">例如：固定格式转换、常规检查</text>

  <rect x="850" y="220" width="550" height="220" rx="8" fill="#ffffff" stroke="#1f8a70" stroke-width="3"/>
  <rect x="850" y="220" width="550" height="16" rx="8" fill="#1f8a70"/>
  <text x="1125" y="295" text-anchor="middle" class="head">进入长期工作系统</text>
  <text x="1125" y="345" text-anchor="middle" class="body">反复发生，也持续继承历史状态</text>
  <text x="1125" y="390" text-anchor="middle" class="small">例如：持续写作、长期项目维护</text>

  <rect x="350" y="820" width="1040" height="60" rx="8" fill="#ffffff" stroke="#c5ccd4" stroke-width="2"/>
  <text x="870" y="858" text-anchor="middle" class="body">先选择最小结构，再让系统随着真实摩擦逐步成长</text>
</svg>
